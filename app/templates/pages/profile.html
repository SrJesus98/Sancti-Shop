{% extends "base.html" %}
{% block title %}Mi perfil — E-commerce{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Mi perfil</h1>

    <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6 max-w-md">
        <div class="flex items-center space-x-4 mb-6">
            <div class="w-16 h-16 bg-primary-100 rounded-full flex items-center justify-center">
                <span class="text-2xl font-bold text-primary-600">{{ user.email[0]|upper }}</span>
            </div>
            <div>
                <h2 class="text-xl font-semibold">{{ user.email }}</h2>
                <span class="text-sm text-gray-500">Rol: <strong>{{ user.rol }}</strong></span>
            </div>
        </div>
        <hr>
        <div class="mt-4 space-y-3">
            <a href="/views/orders" class="block text-primary-600 hover:text-primary-700 font-medium">📦 Mis pedidos</a>
        </div>
    </div>
</div>
{% endblock %}
