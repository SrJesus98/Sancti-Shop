{% extends "base.html" %}
{% block title %}Mis pedidos — E-commerce{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Mis pedidos</h1>
    <div id="orders-container" class="space-y-4">
        <!-- Se llena con JS -->
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const token = localStorage.getItem('access_token');

async function loadOrders() {
    try {
        const response = await fetch('/api/orders/', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const orders = await response.json();
            renderOrders(orders);
        }
    } catch (err) {
        console.error(err);
    }
}

function renderOrders(orders) {
    const container = document.getElementById('orders-container');

    if (!orders || orders.length === 0) {
        container.innerHTML = `
            <div class="text-center py-16">
                <p class="text-gray-500 text-lg">No tienes pedidos aún</p>
                <a href="/views/" class="text-primary-600 hover:underline mt-2 inline-block">Ir a comprar</a>
            </div>
        `;
        return;
    }

    let html = '';
    for (const order of orders) {
        const statusColors = {
            'En proceso': 'bg-yellow-100 text-yellow-700',
            'Pagada': 'bg-green-100 text-green-700',
            'Lista': 'bg-blue-100 text-blue-700',
            'Entregada': 'bg-gray-100 text-gray-700'
        };
        const statusClass = statusColors[order.status] || 'bg-gray-100 text-gray-700';

        html += `
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-gray-500">Pedido #${order.id}</p>
                        <p class="text-lg font-bold text-gray-800">$${order.total.toFixed(2)}</p>
                    </div>
                    <span class="px-3 py-1 rounded-full text-sm font-medium ${statusClass}">${order.status}</span>
                </div>
                <p class="text-xs text-gray-400 mt-2">${new Date(order.created_at).toLocaleDateString('es-ES')}</p>
            </div>
        `;
    }
    container.innerHTML = html;
}

loadOrders();
</script>
{% endblock %}
