{% extends "base.html" %}
{% block title %}Carrito — SanctiShop{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Tu carrito</h1>

    <div id="cart-container" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        {# Items del carrito #}
        <div class="lg:col-span-2 space-y-4" id="cart-items">
            <!-- Se llena con JS -->
        </div>

        {# Resumen #}
        <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6 h-fit">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Resumen</h2>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between text-gray-600">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">$0.00</span>
                </div>
                <div class="flex justify-between text-gray-600">
                    <span>Envío</span>
                    <span id="cart-shipping">Gratis</span>
                </div>
                <hr class="my-2">
                <div class="flex justify-between text-lg font-bold text-gray-800">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
            </div>
            <p id="cart-empty-msg" class="text-center text-gray-500 text-sm mt-4 hidden">Tu carrito está vacío</p>
            <a href="/views/checkout" id="checkout-btn"
               class="mt-6 block w-full bg-primary-600 text-white py-3 rounded-lg hover:bg-primary-700 font-semibold text-center transition">
                Ir a pagar
            </a>
            <button onclick="clearCart()" class="mt-2 w-full text-gray-500 hover:text-red-500 text-sm py-2 transition">
                Vaciar carrito
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let cartData = null;

async function loadCart() {
    const token = localStorage.getItem('access_token');
    if (!token) {
        document.getElementById('cart-items').innerHTML =
            '<div class="text-center py-12 text-gray-500">Debes <a href="/views/login" class="text-primary-600 hover:underline">iniciar sesión</a> para ver tu carrito</div>';
        document.getElementById('checkout-btn').classList.add('hidden');
        return;
    }

    try {
        const response = await fetch('/api/cart', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
            cartData = await response.json();
            renderCart(cartData);
        } else if (response.status === 401) {
            localStorage.removeItem('access_token');
            location.reload();
        }
    } catch (err) {
        console.error('Error loading cart:', err);
    }
}

function renderCart(data) {
    const container = document.getElementById('cart-items');

    if (!data.items || data.items.length === 0) {
        container.innerHTML = `
            <div class="text-center py-16">
                <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
                </svg>
                <h3 class="text-xl font-semibold text-gray-500">Tu carrito está vacío</h3>
                <a href="/views/" class="text-primary-600 hover:underline mt-2 inline-block">Ver productos</a>
            </div>
        `;
        document.getElementById('cart-subtotal').textContent = '$0.00';
        document.getElementById('cart-total').textContent = '$0.00';
        document.getElementById('cart-empty-msg').classList.remove('hidden');
        return;
    }

    document.getElementById('cart-empty-msg').classList.add('hidden');
    let html = '';
    let subtotal = 0;

    for (const item of data.items) {
        const total = item.subtotal;
        subtotal += total;
        const productName = `Producto #${item.product_id}`;
        html += `
            <div class="flex items-center bg-white rounded-xl shadow-sm border border-gray-200 p-4" data-item-id="${item.id}">
                <div class="w-16 h-16 bg-gradient-to-br from-primary-100 to-primary-50 rounded-lg flex items-center justify-center flex-shrink-0">
                    <span class="text-primary-600 font-bold">${productName[0]}</span>
                </div>
                <div class="ml-4 flex-1">
                    <h3 class="font-semibold text-gray-800">${productName}</h3>
                    <p class="text-sm text-gray-500">$${item.unit_price.toFixed(2)} c/u</p>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="updateItem(${item.id}, ${item.quantity - 1})"
                            class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-100 text-gray-600">−</button>
                    <span class="font-medium w-8 text-center">${item.quantity}</span>
                    <button onclick="updateItem(${item.id}, ${item.quantity + 1})"
                            class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center hover:bg-gray-100 text-gray-600">+</button>
                </div>
                <div class="ml-6 text-right">
                    <p class="font-bold text-primary-600">$${total.toFixed(2)}</p>
                    <button onclick="removeItem(${item.id})" class="text-xs text-red-500 hover:text-red-600">Eliminar</button>
                </div>
            </div>
        `;
    }

    container.innerHTML = html;
    document.getElementById('cart-subtotal').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('cart-total').textContent = `$${subtotal.toFixed(2)}`;
}

async function updateItem(itemId, newQty) {
    if (newQty <= 0) {
        await removeItem(itemId);
        return;
    }
    const token = localStorage.getItem('access_token');
    try {
        const response = await fetch(`/api/cart/items/${itemId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ quantity: newQty })
        });
        if (response.ok) loadCart();
    } catch (err) {
        console.error(err);
    }
}

async function removeItem(itemId) {
    const token = localStorage.getItem('access_token');
    try {
        const response = await fetch(`/api/cart/items/${itemId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) loadCart();
    } catch (err) {
        console.error(err);
    }
}

async function clearCart() {
    const token = localStorage.getItem('access_token');
    try {
        const response = await fetch('/api/cart/items', {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) loadCart();
    } catch (err) {
        console.error(err);
    }
}

// Cargar carrito al entrar
loadCart();
</script>
{% endblock %}
