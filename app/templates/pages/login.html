{% extends "base.html" %}
{% block title %}Iniciar sesión — E-commerce{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-lg border border-gray-200 p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-primary-600">Iniciar sesión</h1>
                <p class="text-gray-500 mt-2">Ingresa tus credenciales para continuar</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                           placeholder="tu@correo.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                           placeholder="••••••••">
                </div>

                <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>

                <button type="submit" id="login-btn"
                        class="w-full bg-primary-600 text-white py-2.5 rounded-lg hover:bg-primary-700 font-medium transition disabled:opacity-50">
                    Iniciar sesión
                </button>
            </form>

            <p class="text-center mt-6 text-sm text-gray-500">
                ¿No tienes cuenta?
                <a href="/views/register" class="text-primary-600 hover:text-primary-700 font-medium">Regístrate aquí</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errorDiv = document.getElementById('login-error');

    btn.disabled = true;
    btn.textContent = 'Iniciando sesión...';
    errorDiv.classList.add('hidden');

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });

        if (response.ok) {
            const data = await response.json();
            // Guardar token para llamadas JS
            localStorage.setItem('access_token', data.access_token);
            // Redirigir al inicio
            window.location.href = '/views/';
        } else {
            const data = await response.json();
            errorDiv.textContent = data.detail || 'Error al iniciar sesión';
            errorDiv.classList.remove('hidden');
        }
    } catch (err) {
        errorDiv.textContent = 'Error de conexión. Intenta de nuevo.';
        errorDiv.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
    }
});
</script>
{% endblock %}
