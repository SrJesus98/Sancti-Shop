<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bag-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Shopping bag icon -->
  <g transform="translate(2, 5)">
    <!-- Bag body -->
    <path d="M4,15 L6,8 L30,8 L32,15 L32,40 L4,40 Z" fill="url(#bag-grad)" rx="3"/>
    <!-- Bag handle -->
    <path d="M10,8 Q10,0 18,0 Q26,0 26,8" fill="none" stroke="url(#bag-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bag detail lines -->
    <line x1="10" y1="20" x2="26" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="26" x2="26" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Small star (Sancti Spiritus touch) -->
    <circle cx="18" cy="22" r="3" fill="rgba(255,255,255,0.9)"/>
    <polygon points="18,19.5 18.8,21.2 20.5,21.5 19.2,22.8 19.5,24.5 18,23.7 16.5,24.5 16.8,22.8 15.5,21.5 17.2,21.2" fill="#1D4ED8" transform="scale(0.6) translate(12, 13)"/>
  </g>

  <!-- Text -->
  <g transform="translate(42, 12)">
    <!-- Shadow text for depth -->
    <text x="1" y="26" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="26" fill="rgba(0,0,0,0.08)" letter-spacing="-0.5">SanctiShop</text>
    <!-- Main text -->
    <text x="0" y="25" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="26" fill="url(#logo-grad)" letter-spacing="-0.5">SanctiShop</text>
    <!-- Tagline -->
    <text x="0" y="38" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="9" fill="#64748B" letter-spacing="2.5" text-transform="uppercase">SANCTI SPÍRITUS • CUBA</text>
  </g>
</svg>
